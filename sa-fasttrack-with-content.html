<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solutions Architect — Full Learning Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300;1,600&family=JetBrains+Mono:wght@400;500;600&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #7d8590;
  --orange: #f0883e;
  --orange-dim: #3d2012;
  --blue: #58a6ff;
  --blue-dim: #0d2044;
  --green: #3fb950;
  --green-dim: #0f2d18;
  --purple: #bc8cff;
  --purple-dim: #1f1035;
  --yellow: #d29922;
  --yellow-dim: #2d2007;
  --red: #f85149;
  --red-dim: #2d0f0e;
  --teal: #39d0d8;
  --teal-dim: #0d2d30;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Mulish', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Layout */
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--orange);
  margin-bottom: 4px;
}

.sidebar-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Progress in sidebar */
.sidebar-progress {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.sp-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

.sp-bar {
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 6px;
}

.sp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--yellow));
  border-radius: 999px;
  transition: width 0.5s ease;
}

.sp-counts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
}

/* Nav items */
.nav-section { padding: 12px 0; }

.nav-week {
  padding: 8px 20px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}

.nav-week:hover { background: var(--surface2); }
.nav-week.active {
  background: var(--surface2);
  border-left-color: var(--orange);
}

.nav-week-range {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}

.nav-week-title {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
}

.nav-week-prog {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  margin-top: 4px;
}

/* Main content */
.main {
  margin-left: 280px;
  flex: 1;
  min-height: 100vh;
}

/* Top bar */
.topbar {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
  backdrop-filter: blur(8px);
}

.topbar-title {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  font-weight: 600;
}

.topbar-week {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
}

/* Content area */
.content {
  padding: 40px;
  max-width: 860px;
}

/* Week header */
.week-hero {
  margin-bottom: 36px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.week-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 12px;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.week-hero h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 12px;
}

.week-desc {
  color: var(--muted);
  font-size: 0.9rem;
  max-width: 600px;
  line-height: 1.65;
}

/* Objective card */
.obj-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.obj-card:hover { border-color: var(--orange); }
.obj-card.completed { border-color: var(--green); opacity: 0.8; }

.obj-card-top {
  padding: 20px 24px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  cursor: pointer;
}

.obj-checkbox {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all 0.2s;
  cursor: pointer;
}

.obj-card.completed .obj-checkbox {
  background: var(--green);
  border-color: var(--green);
  color: #000;
}

.obj-top-right { flex: 1; }

.obj-title {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 6px;
}

.obj-card.completed .obj-title {
  color: var(--muted);
  text-decoration: line-through;
}

.obj-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.obj-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.expand-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.expand-btn:hover { border-color: var(--orange); color: var(--orange); }

/* Learning content panel */
.obj-content {
  display: none;
  border-top: 1px solid var(--border);
}

.obj-card.expanded .obj-content { display: block; }

.content-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  overflow-x: auto;
}

.tab-btn {
  padding: 10px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}

.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }

.tab-panel { display: none; padding: 24px; }
.tab-panel.active { display: block; }

/* Content styles */
.learn-section { margin-bottom: 24px; }

.learn-section h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--orange);
  margin-bottom: 10px;
}

.learn-section p {
  font-size: 0.875rem;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 8px;
}

.learn-section p strong { color: var(--text); }

.concept-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.concept-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
}

.concept-item .concept-name {
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--blue);
  margin-bottom: 4px;
}

.concept-item .concept-desc {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.6;
}

/* Code block */
.code-block {
  background: #010409;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: #c9d1d9;
  overflow-x: auto;
  line-height: 1.6;
  margin: 10px 0;
  white-space: pre;
}

.code-comment { color: #6e7681; }
.code-key { color: #ff7b72; }
.code-val { color: #a5d6ff; }
.code-str { color: #a8d8a8; }

/* Lab steps */
.lab-steps {
  counter-reset: step;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.lab-step {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.lab-step::before {
  counter-increment: step;
  content: counter(step);
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--orange-dim);
  color: var(--orange);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.lab-step-body { flex: 1; }
.lab-step-title { font-weight: 600; font-size: 0.875rem; margin-bottom: 4px; }
.lab-step-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }

/* Exam tips */
.exam-tips { display: flex; flex-direction: column; gap: 10px; }

.exam-tip {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 6px;
  border: 1px solid;
}

.exam-tip.warn {
  background: var(--yellow-dim);
  border-color: var(--yellow);
}

.exam-tip.good {
  background: var(--green-dim);
  border-color: var(--green);
}

.exam-tip.info {
  background: var(--blue-dim);
  border-color: var(--blue);
}

.exam-tip-icon { font-size: 1rem; flex-shrink: 0; }
.exam-tip-text { font-size: 0.82rem; line-height: 1.6; }
.exam-tip-text strong { display: block; margin-bottom: 2px; font-size: 0.8rem; }

/* Resources */
.resource-list { display: flex; flex-direction: column; gap: 8px; }

.resource-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.82rem;
  transition: border-color 0.15s;
}

.resource-item:hover { border-color: var(--blue); }

.resource-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}

.resource-name { flex: 1; color: var(--blue); font-weight: 500; }
.resource-time { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); }

/* Nav buttons */
.nav-btns {
  display: flex;
  gap: 12px;
  margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}

.nav-btn {
  padding: 10px 24px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: all 0.15s;
}

.nav-btn:hover { border-color: var(--orange); color: var(--orange); }
.nav-btn.primary { background: var(--orange); border-color: var(--orange); color: #000; font-weight: 600; }
.nav-btn.primary:hover { background: #d4731a; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-anim { animation: fadeIn 0.35s ease both; }

/* Mobile */
@media (max-width: 720px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 24px 16px; }
  .topbar { padding: 14px 16px; }
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">SA Fast-Track</div>
    <div class="sidebar-sub">Cloud Engineer → Architect</div>
  </div>
  <div class="sidebar-progress">
    <div class="sp-label">
      <span>Overall Progress</span>
      <span id="sp-pct">0%</span>
    </div>
    <div class="sp-bar"><div class="sp-bar-fill" id="sp-bar-fill" style="width:0%"></div></div>
    <div class="sp-counts" id="sp-counts">0 of 0 objectives completed</div>
  </div>
  <nav class="nav-section" id="sidebar-nav"></nav>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="topbar-week" id="topbar-week">Week 1–2</div>
      <div class="topbar-title" id="topbar-title">Architecture Thinking Mindset</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="nav-btn" onclick="prevWeek()">← Prev</button>
      <button class="nav-btn primary" onclick="nextWeek()">Next →</button>
    </div>
  </div>

  <div class="content fade-anim" id="content-area"></div>
</main>

</div>

<script>
const weeks = [
  {
    range: "Weeks 1–2",
    title: "Architecture Thinking Mindset",
    color: "#58a6ff",
    colorDim: "#0d2044",
    desc: "Shift from 'how do I deploy this' to 'why should I deploy it this way'. This week is about developing the structured decision-making framework that defines professional-level architects.",
    objectives: [
      {
        title: "Apply the AWS Well-Architected Framework (5 pillars) to critique a real architecture",
        tag: "Framework", tagColor: "#0d2044", tagText: "#58a6ff",
        learn: {
          overview: `The <strong>AWS Well-Architected Framework</strong> is the official lens through which Solutions Architects evaluate every design decision. It has 5 pillars — and SAP exam scenarios almost always map to one or more of them.\n\nThink of it as your mental checklist before signing off on any architecture.`,
          concepts: [
            { name: "Operational Excellence", desc: "Can you run, monitor, and improve this system over time? Focuses on automation, runbooks, and CI/CD. Key services: CloudFormation, Systems Manager, CloudWatch." },
            { name: "Security", desc: "Is every layer protected? Apply least privilege, encrypt everything, enable traceability. Key services: IAM, KMS, CloudTrail, GuardDuty." },
            { name: "Reliability", desc: "Will it recover from failure automatically? Multi-AZ, backups, auto-scaling. Key services: Route 53, ELB, RDS Multi-AZ, S3 versioning." },
            { name: "Performance Efficiency", desc: "Are you using the right resource type and size? Rightsizing, serverless, caching. Key services: ElastiCache, CloudFront, Lambda." },
            { name: "Cost Optimization", desc: "Are you paying only for what you need? Reserved instances, Spot, S3 lifecycle policies. Key services: AWS Cost Explorer, Savings Plans." },
          ],
          lab: [
            { title: "Open AWS Well-Architected Tool", desc: "In the AWS Console, search for 'Well-Architected Tool' and create a new Workload." },
            { title: "Pick a past project", desc: "Choose any app you deployed during Cloud Engineering training (e.g. your VPC + EC2 + RDS setup)." },
            { title: "Answer the pillar questions", desc: "Work through the WAF questionnaire. You'll get a risk report showing High/Medium risk items — this is your first architecture review!" },
            { title: "Write up 3 improvements", desc: "For each High Risk finding, write one sentence: what's the risk, what's the fix, what AWS service you'd use. Save this — it's portfolio gold." },
          ],
          examTips: [
            { type: "warn", icon: "⚠️", title: "Most common trap", text: "Questions often have two 'correct' answers — one that meets the requirement, and one that meets it AND aligns with a WAF pillar. Always pick the WAF-aligned one." },
            { type: "good", icon: "✅", title: "Quick win", text: "Memorise which pillar each AWS service primarily supports. e.g. CloudTrail = Security, Auto Scaling = Reliability, Spot Instances = Cost Optimization." },
            { type: "info", icon: "💡", title: "Exam weighting", text: "The SAP exam doesn't ask 'what are the pillars' directly — it gives scenarios and expects you to apply pillar thinking implicitly." },
          ],
          resources: [
            { type: "Doc", name: "AWS Well-Architected Framework Whitepaper", time: "2 hrs", typeColor: "#0d2044", typeText: "#58a6ff" },
            { type: "Tool", name: "AWS Well-Architected Tool (free in console)", time: "1 hr lab", typeColor: "#0f2d18", typeText: "#3fb950" },
            { type: "Course", name: "Stephane Maarek — SAP-C02 on Udemy (WAF section)", time: "45 min", typeColor: "#1f1035", typeText: "#bc8cff" },
          ]
        }
      },
      {
        title: "Explain trade-offs between monolithic, microservices, and serverless with cost/latency examples",
        tag: "Design", tagColor: "#2d0f0e", tagText: "#f85149",
        learn: {
          overview: `Architecture selection is the core skill of a Solutions Architect. You're not just deploying — you're <strong>choosing the right pattern for the constraints</strong>. Every pattern has trade-offs, and the exam will test whether you know when NOT to use a pattern.`,
          concepts: [
            { name: "Monolithic", desc: "Single deployable unit. Simple to develop and deploy initially. Becomes hard to scale and maintain as it grows. Best for small teams, early-stage products, or internal tools with low traffic." },
            { name: "Microservices", desc: "Independently deployable services communicating via APIs or events. High operational complexity but excellent scalability and team autonomy. Needs good observability tooling (X-Ray, CloudWatch). AWS: ECS, EKS, API Gateway." },
            { name: "Serverless", desc: "No server management. Pay per execution. Cold starts can add latency. Ideal for event-driven, spiky, or async workloads. AWS: Lambda, SQS, EventBridge, Step Functions." },
            { name: "Cost comparison", desc: "Monolith: predictable (fixed EC2 cost). Microservices: higher base infra cost but efficient at scale. Serverless: near-zero idle cost, but can be expensive at high sustained throughput." },
          ],
          lab: [
            { title: "Draw all 3 patterns", desc: "Using draw.io or Excalidraw, draw the same e-commerce checkout flow implemented as: (1) monolith on EC2, (2) microservices on ECS, (3) serverless with Lambda + API Gateway + DynamoDB." },
            { title: "Estimate costs", desc: "Use the AWS Pricing Calculator to estimate monthly cost for each at 10,000 requests/day and again at 1,000,000 requests/day. Note where each becomes cheaper or more expensive." },
            { title: "Identify the inflection point", desc: "Find the traffic level at which serverless becomes more expensive than a reserved EC2 instance. This number appears in real exam scenarios." },
          ],
          examTips: [
            { type: "warn", icon: "⚠️", title: "Common trick", text: "If a question mentions 'unpredictable traffic spikes' → serverless. 'Consistent high throughput 24/7' → EC2 Reserved. Memorise these trigger words." },
            { type: "good", icon: "✅", title: "Think in constraints", text: "The exam gives you constraints (cost, latency, team size, compliance). Match the pattern to the constraints, not to what's technically impressive." },
            { type: "info", icon: "💡", title: "Step Functions", text: "For orchestrating microservices with complex workflows, Step Functions is the SAP-preferred answer over custom Lambda chaining." },
          ],
          resources: [
            { type: "Whitepaper", name: "AWS Microservices Whitepaper", time: "1.5 hrs", typeColor: "#0d2044", typeText: "#58a6ff" },
            { type: "Tool", name: "draw.io (free diagramming)", time: "Lab", typeColor: "#0f2d18", typeText: "#3fb950" },
            { type: "Video", name: "AWS re:Invent — Serverless vs Containers decision guide", time: "45 min", typeColor: "#2d2007", typeText: "#d29922" },
          ]
        }
      },
      {
        title: "Calculate TCO for migrating an on-premises workload to AWS using the Pricing Calculator",
        tag: "FinOps", tagColor: "#0f2d18", tagText: "#3fb950",
        learn: {
          overview: `<strong>Total Cost of Ownership (TCO)</strong> is one of the primary tools architects use to justify cloud migrations to leadership. If you can't quantify the financial benefit, the project doesn't get approved. SAP exams test this heavily in migration scenarios.`,
          concepts: [
            { name: "On-premises costs to count", desc: "Hardware purchase/refresh (3–5 yr cycle), data centre space and power, cooling, networking, OS licences, staff for maintenance, and disaster recovery hardware. These are often invisible in IT budgets." },
            { name: "AWS cost advantages", desc: "Pay-as-you-go (no upfront), Reserved Instances (up to 72% off on-demand), Spot (up to 90% off), no hardware refresh costs, managed services eliminate operational overhead." },
            { name: "Hidden migration costs", desc: "Refactoring code, retraining staff, data transfer OUT of on-prem (one-time), potential downtime. Always include these — a TCO that ignores migration costs looks dishonest." },
            { name: "ROI timeline", desc: "Most migrations break even at 18–36 months. Savings accelerate in years 3–5 as on-prem hardware would need refresh. Show a 5-year projection in your business case." },
          ],
          lab: [
            { title: "Open AWS Pricing Calculator", desc: "Go to calculator.aws. Add an EC2 instance (equivalent to your on-prem server spec) + RDS + S3 storage for a typical 3-tier web app." },
            { title: "Model on-prem baseline", desc: "Estimate the same setup on-prem: 2× physical servers ($8K each, 5yr life), co-location ($500/mo), SAN storage ($15K), plus 20% of a sysadmin's time ($15K/yr)." },
            { title: "Calculate 3-year and 5-year TCO", desc: "Build a simple spreadsheet comparing total spend. Add Reserved Instance pricing for AWS. Show cumulative cost curves — the point where they cross is your payback period." },
            { title: "Add intangible benefits", desc: "Note: elasticity value (scale for peaks without buying for peaks), faster time to market, built-in disaster recovery. Architects present these qualitatively alongside the numbers." },
          ],
          examTips: [
            { type: "info", icon: "💡", title: "AWS Migration Evaluator", text: "The exam sometimes mentions AWS Migration Evaluator (formerly TSO Logic) as the tool for automated TCO analysis at enterprise scale — different from the Pricing Calculator." },
            { type: "good", icon: "✅", title: "Reserved vs On-Demand", text: "For steady workloads, Reserved Instances are always cheaper. The exam expects you to recommend RIs for predictable baseline loads and On-Demand/Spot for variable peaks." },
            { type: "warn", icon: "⚠️", title: "Data transfer costs", text: "Data transfer OUT of AWS costs money. Data transfer IN is free. This surprises many and appears in cost optimisation questions." },
          ],
          resources: [

            { name: "Warm Standby", desc: "RPO: seconds/minutes. RTO: minutes. Full system runs in DR region at reduced scale (e.g. 20% of prod capacity). During disaster, scale up using Auto Scaling. More expensive than Pilot Light but faster recovery." },

          concepts: [
            { name: "Retire", desc: "~10–20% of workloads. Shut it down — it's no longer needed. Migration is the perfect time to identify zombie systems. Before retiring, confirm no hidden dependencies." },
            { name: "Retain", desc: "Keep on-premises for now. Reasons: compliance, mainframe dependencies, not yet migration-ready, or simply 'not worth the effort yet'. Revisit in 12–24 months." },
            { name: "Rehost (Lift & Shift)", desc: "Move to AWS with no code changes. Use AWS Application Migration Service (MGN). Fastest way to migrate — good for meeting a data centre deadline. Limited cloud optimisation benefits initially." },
            { name: "Replatform (Lift, Tinker & Shift)", desc: "Minor optimisations without changing core architecture. E.g. move MySQL on EC2 → RDS MySQL (managed service, no OS patches). Quick win, meaningful operational benefit." },
            { name: "Repurchase", desc: "Drop existing app, buy a SaaS replacement. E.g. on-prem CRM → Salesforce. Lose customisations, gain managed service. Good when the app is a commodity." },
            { name: "Refactor / Re-architect", desc: "Re-build using cloud-native services. E.g. monolith → microservices on ECS + Lambda. Highest effort, highest long-term benefit. Justified for core business differentiating apps." },
            { name: "Relocate", desc: "Move VMware workloads to VMware Cloud on AWS. No changes to VMs, hypervisor, or tools. Useful for large VMware estates where refactoring isn't feasible yet." },

            { title: "Build a migration portfolio", desc: "Create a spreadsheet: Workload | Current State | Recommended R | Rationale | Estimated Effort (S/M/L) | Priority (1–3). This is a real deliverable architects produce for clients." },

let currentWeek = 0;
let checked = {};
let expandedCards = {};

function totalObjectives() {
  let t = 0;
  weeks.forEach(w => t += w.objectives.length);
  return t;
}

function doneCount() {
  let d = 0;
  weeks.forEach((w, wi) => w.objectives.forEach((_, oi) => {
    if (checked[`${wi}-${oi}`]) d++;
  }));
  return d;
}

function updateProgress() {
  const total = totalObjectives();
  const done = doneCount();
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('sp-pct').textContent = pct + '%';
  document.getElementById('sp-bar-fill').style.width = pct + '%';
  document.getElementById('sp-counts').textContent = `${done} of ${total} objectives completed`;
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  weeks.forEach((w, wi) => {
    const done = w.objectives.filter((_, oi) => checked[`${wi}-${oi}`]).length;
    const el = document.createElement('div');
    el.className = 'nav-week' + (wi === currentWeek ? ' active' : '');
    el.onclick = () => goToWeek(wi);
    el.innerHTML = `
      <div class="nav-week-range">${w.range}</div>
      <div class="nav-week-title">${w.title}</div>
      <div class="nav-week-prog" style="color:${done === w.objectives.length && done > 0 ? '#3fb950' : '#7d8590'}">${done}/${w.objectives.length} done</div>
    `;
    nav.appendChild(el);
  });
}

function renderContent() {
  const w = weeks[currentWeek];
  document.getElementById('topbar-week').textContent = w.range;
  document.getElementById('topbar-title').textContent = w.title;

  const area = document.getElementById('content-area');
  area.className = 'content fade-anim';

  let html = `
    <div class="week-hero">
      <span class="week-badge" style="background:${w.colorDim};color:${w.color}">${w.range}</span>
      <h2>${w.title}</h2>
      <p class="week-desc">${w.desc}</p>
    </div>
  `;

  w.objectives.forEach((obj, oi) => {
    const key = `${currentWeek}-${oi}`;
    const done = checked[key] || false;
    const expanded = expandedCards[key] || false;

    html += `
      <div class="obj-card ${done ? 'completed' : ''} ${expanded ? 'expanded' : ''}" id="card-${key}">
        <div class="obj-card-top">
          <div class="obj-checkbox" onclick="toggleCheck('${key}')">${done ? '✓' : ''}</div>
          <div class="obj-top-right">
            <div class="obj-title">${obj.title}</div>
            <div class="obj-meta">
              <span class="obj-tag" style="background:${obj.tagColor};color:${obj.tagText}">${obj.tag}</span>
              <button class="expand-btn" onclick="toggleExpand('${key}')">
                ${expanded ? '▲ Hide content' : '▼ Study content'}
              </button>
            </div>
          </div>
        </div>
        <div class="obj-content">
          <div class="content-tabs" id="tabs-${key}">
            <button class="tab-btn active" onclick="showTab('${key}','overview',this)">Overview</button>
            <button class="tab-btn" onclick="showTab('${key}','concepts',this)">Key Concepts</button>
            <button class="tab-btn" onclick="showTab('${key}','lab',this)">Hands-on Lab</button>
            <button class="tab-btn" onclick="showTab('${key}','exam',this)">Exam Tips</button>
            <button class="tab-btn" onclick="showTab('${key}','resources',this)">Resources</button>
          </div>
          ${renderTabPanels(obj.learn, key)}
        </div>
      </div>
    `;
  });

  html += `
    <div class="nav-btns">
      ${currentWeek > 0 ? `<button class="nav-btn" onclick="prevWeek()">← ${weeks[currentWeek-1].title}</button>` : ''}
      ${currentWeek < weeks.length - 1 ? `<button class="nav-btn primary" onclick="nextWeek()">Next: ${weeks[currentWeek+1].title} →</button>` : '<button class="nav-btn primary" style="background:#3fb950;border-color:#3fb950">🎉 All weeks complete — Book your exam!</button>'}
    </div>
  `;

  area.innerHTML = html;
}

              <span class="resource-type" style="background:${r.typeColor};color:${r.typeText}">${r.type}</span>
              <span class="resource-name">${r.name}</span>
              <span class="resource-time">${r.time}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function toggleCheck(key) {
  checked[key] = !checked[key];
  const card = document.getElementById('card-' + key);
  const box = card.querySelector('.obj-checkbox');
  const title = card.querySelector('.obj-title');
  if (checked[key]) {
    card.classList.add('completed');
    box.textContent = '✓';
  } else {
    card.classList.remove('completed');
    box.textContent = '';
  }
  updateProgress();
  renderSidebar();
}

function toggleExpand(key) {
  expandedCards[key] = !expandedCards[key];
  const card = document.getElementById('card-' + key);
  const btn = card.querySelector('.expand-btn');
  card.classList.toggle('expanded');
  btn.textContent = expandedCards[key] ? '▲ Hide content' : '▼ Study content';
}

function showTab(key, tabName, btnEl) {
  const panels = ['overview','concepts','lab','exam','resources'];
  panels.forEach(p => {
    const el = document.getElementById(`tab-${key}-${p}`);
    if (el) el.classList.remove('active');
  });
  const active = document.getElementById(`tab-${key}-${tabName}`);
  if (active) active.classList.add('active');

  const tabsEl = document.getElementById('tabs-' + key);
  if (tabsEl) tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
}

function goToWeek(wi) {
  currentWeek = wi;
  renderSidebar();
  renderContent();
  document.querySelector('.main').scrollTo(0, 0);
  window.scrollTo(0, 0);
}

function nextWeek() {
  if (currentWeek < weeks.length - 1) goToWeek(currentWeek + 1);
}

function prevWeek() {
  if (currentWeek > 0) goToWeek(currentWeek - 1);
}

// Init
updateProgress();
renderSidebar();
renderContent();
</script>
</body>
</html>
